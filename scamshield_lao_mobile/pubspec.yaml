name: scamshield_lao_mobile
description: ScamShield Lao — Real-time scam detection for Lao users, powered by DeepSeek-R1 AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3

  # Navigation
  go_router: ^13.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # Typography
  google_fonts: ^6.2.1

  # UI / Animations
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Utilities
  uuid: ^4.3.3
  url_launcher: ^6.2.6
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_overlay_window: ^0.4.0
  google_mlkit_text_recognition: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
